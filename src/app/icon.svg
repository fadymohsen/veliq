<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" role="img" aria-label="VELIQ">
  <defs>
    <!-- Brand gradients for the rounded-square background -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F235F"/>
      <stop offset="100%" stop-color="#235FAA"/>
    </linearGradient>

    <!-- V gradient: navy → royal → sky (matches the wordmark logo) -->
    <linearGradient id="vGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#142D6E"/>
      <stop offset="50%"  stop-color="#235FAA"/>
      <stop offset="100%" stop-color="#3C9BD2"/>
    </linearGradient>

    <!-- Light-mode V gradient (when bg is white in dark-mode-inverse scenarios) -->
    <linearGradient id="vGradLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#142D6E"/>
      <stop offset="50%"  stop-color="#235FAA"/>
      <stop offset="100%" stop-color="#3C9BD2"/>
    </linearGradient>
  </defs>

  <style>
    /* Default: dark navy rounded square + bright V */
    .bg   { fill: url(#bgGrad); }
    .v    { fill: #FFFFFF; }

    /* When the browser/OS is in dark mode, keep the same look —
       the icon already works on dark UIs. */
    @media (prefers-color-scheme: dark) {
      .bg { fill: url(#bgGrad); }
      .v  { fill: #FFFFFF; }
    }

    /* Optional: monochrome fallback (Safari pinned tab uses this).
       Browsers that ignore color will render the V silhouette only. */
  </style>

  <!-- Rounded-square background -->
  <rect class="bg" x="0" y="0" width="100" height="100" rx="22" ry="22"/>

  <!-- V monogram, geometrically matched to the wordmark's V -->
  <!-- Outer-left → inner-left → apex → inner-right → outer-right → apex-tail -->
  <path class="v"
        d="M 18,18
           L 30,18
           L 50,76
           L 70,18
           L 82,18
           L 56,86
           L 44,86
           Z"/>
</svg>
